[pytest]
# Pytest configuration for Moonstone

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

filterwarnings =
    ignore::pytest.PytestUnhandledThreadExceptionWarning

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    # --cov=moonstone
    # --cov-report=term-missing
    # --cov-report=html:htmlcov

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, use fixtures)
    api: API endpoint tests
    concurrency: Concurrency and thread-safety tests
    slow: Slow-running tests (>1s)
    network: Tests that require network access

# Coverage options
[coverage:run]
source = moonstone
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 1
show_missing = true
skip_covered = false

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
