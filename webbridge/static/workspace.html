<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Moonstone Workspace</title>
<link rel="stylesheet" href="/static/moonstone.css">
<link rel="stylesheet" href="/static/workspace.css">
<script>
// Restore saved theme before first paint to avoid flash
(function(){
  var saved = localStorage.getItem('ws-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<!-- Toolbar -->
<div class="ws-toolbar">
  <div class="ws-toolbar-title">
    <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
    Workspace
  </div>

  <div class="ws-toolbar-sep"></div>

  <!-- Layout selector -->
  <div class="ws-layout-select">
    <div class="ws-layout-current" onclick="toggleLayoutDropdown()">
      <span id="layoutCurrentLabel">Untitled</span>
      <span class="arrow">&#x25BC;</span>
    </div>
    <div class="ws-layout-dropdown" id="layoutDropdown"></div>
  </div>

  <div class="ws-toolbar-group">
    <button class="ws-btn ws-btn-accent" onclick="openSaveDialog()" title="Save layout (Ctrl+S)">
      &#x1F4BE; <span class="label">Save</span>
    </button>
  </div>

  <div class="ws-toolbar-spacer"></div>

  <div class="ws-toolbar-group">
    <button class="ws-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle dark/light theme">
      <span id="themeIcon">&#x2600;</span>
    </button>
    <div class="ws-toolbar-sep"></div>
    <button class="ws-btn" onclick="window.open('/', '_blank')" title="Dashboard">
      &#x1F3E0;
    </button>
    <button class="ws-btn" onclick="window.open('/api/docs', '_blank')" title="API Docs">
      &#x1F4D6;
    </button>
  </div>
</div>

<!-- Main layout area -->
<div class="ws-main" id="wsMain"></div>

<!-- Drag overlay (blocks iframe mouse capture during splitter drag) -->
<div class="ws-drag-overlay" id="dragOverlay"></div>

<!-- Save dialog -->
<div class="ws-overlay" id="saveOverlay" onclick="if(event.target===this)closeSaveDialog()">
  <div class="ws-dialog">
    <h3>Save Layout</h3>
    <p class="sub">Give your layout a name to save and reuse it later</p>
    <input type="text" id="saveNameInput" placeholder="e.g. My Project View"
           onkeydown="if(event.key==='Enter')doSave();if(event.key==='Escape')closeSaveDialog()">
    <div class="ws-dialog-btns">
      <button onclick="closeSaveDialog()">Cancel</button>
      <button class="primary" onclick="doSave()">Save</button>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="ws-statusbar">
  <span class="dot"></span>
  <span id="statusInfo">1 panel</span>
  <span>&middot;</span>
  <a href="/" target="_blank">Dashboard</a>
  <span>&middot;</span>
  <a href="/api/" target="_blank">API</a>
</div>

<script src="/static/workspace.js"></script>
<script>
// Theme toggle with localStorage persistence
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('ws-theme', next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme) {
  var icon = document.getElementById('themeIcon');
  if (icon) icon.innerHTML = theme === 'dark' ? '\u2600' : '\uD83C\uDF19';
}
// Set correct icon on load
updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');
</script>
</body>
</html>
